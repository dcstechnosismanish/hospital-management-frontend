name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            cd /home/ubuntu/Hospital_Management_System_node_frontend

            git config --global --add safe.directory /home/ubuntu/Hospital_Management_System_node_frontend

            git fetch origin main
            git reset --hard origin/main

            npm ci

            npm run build

            pm2 restart hospital-frontend

            pm2 save

            echo "✅ Frontend deployed successfully"
